databases:
  - name: money-split-db
    databaseName: moneysplit
    user: moneysplit
    plan: free

services:
  - type: web
    name: money-split-mcp
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: money-split-db
          property: connectionString
      - key: NODE_ENV
        value: production
